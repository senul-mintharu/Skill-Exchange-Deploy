# In-memory DB for unit/integration smoke tests (no local PostgreSQL required)
spring.datasource.url=jdbc:h2:mem:wedalktest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Override main application.properties (PostgreSQL dialect) for H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
