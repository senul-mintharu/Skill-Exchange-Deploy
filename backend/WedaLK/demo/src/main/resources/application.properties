# =============================================================
# WedaLK Application Configuration
# =============================================================

# ---- Server ----
server.port=8081

# ---- PostgreSQL Database ----
# TODO: Update these with your actual PostgreSQL credentials
# Uncomment the lines below when your database is ready
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Flyway (disabled by default, enable when ready) ----
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# ---- Application Info ----
spring.application.name=WedaLK

# ---- File Upload (for later use) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=./uploads

# ---- JWT Config ----
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- AI Assist Config ----
# Do not commit real API keys. Set GEMINI_API_KEY in your local environment.
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
app.ai.timeout-ms=${AI_TIMEOUT_MS:10000}

# ---- Admin seed config (temporary hardcoded plain password) ----
app.admin.email=admin@wedalk.lk
app.admin.password=admin123
app.admin.full-name=System Admin
