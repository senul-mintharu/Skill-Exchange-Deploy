# =============================================================
# WedaLK Application Configuration
# =============================================================

# ---- Server ----
server.port=8081

# ---- PostgreSQL Database ----
# TODO: Update these with your actual PostgreSQL credentials
# Uncomment the lines below when your database is ready
spring.datasource.url=jdbc:postgresql://localhost:5432/lankafix
spring.datasource.username=postgres
spring.datasource.password=123

# spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# NOTE: JPA/datasource auto-configuration is excluded in WedaLkApplication.java
#       until a database is configured. Uncomment datasource config above and
#       remove the @SpringBootApplication exclude to enable JPA.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Flyway (disabled by default, enable when ready) ----
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# ---- Application Info ----
spring.application.name=WedaLK

# ---- File Upload (for later use) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=./uploads

# ---- JWT Config ----
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Admin seed config (temporary hardcoded plain password) ----
app.admin.email=admin@wedalk.lk
app.admin.password=admin123
app.admin.full-name=System Admin
